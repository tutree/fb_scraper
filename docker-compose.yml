services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper123
      POSTGRES_DB: math_tutor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scraper_network

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://scraper:scraper123@postgres:5432/math_tutor_db
      REDIS_URL: redis://localhost:6379
      FACEBOOK_EMAIL: ${FACEBOOK_EMAIL}
      FACEBOOK_PASSWORD: ${FACEBOOK_PASSWORD}
      PROXY_LIST: ${PROXY_LIST}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config
      - ./cookies:/app/cookies
      - ./logs:/app/logs
      - .:/app
    networks:
      - scraper_network

volumes:
  postgres_data:

networks:
  scraper_network:
    driver: bridge
