services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scraper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scraper123}
      POSTGRES_DB: ${POSTGRES_DB:-math_tutor_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scraper} -d ${POSTGRES_DB:-math_tutor_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - scraper_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - scraper_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scraper}:${POSTGRES_PASSWORD:-scraper123}@postgres:5432/${POSTGRES_DB:-math_tutor_db}
      REDIS_URL: redis://redis:6379
      HEADLESS: ${HEADLESS:-true}
      FACEBOOK_EMAIL: ${FACEBOOK_EMAIL:-}
      FACEBOOK_PASSWORD: ${FACEBOOK_PASSWORD:-}
      PROXY_LIST: ${PROXY_LIST:-}
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      PROJECT_NAME: ${PROJECT_NAME:-Math Tutor Scraper API}
      ENFORMION_AP_NAME: ${ENFORMION_AP_NAME:-}
      ENFORMION_AP_PASSWORD: ${ENFORMION_AP_PASSWORD:-}
      AUTO_SCRAPE_ENABLED: ${AUTO_SCRAPE_ENABLED:-false}
      AUTO_SCRAPE_RUN_ON_STARTUP: ${AUTO_SCRAPE_RUN_ON_STARTUP:-false}
      AUTO_SCRAPE_INTERVAL_MINUTES: ${AUTO_SCRAPE_INTERVAL_MINUTES:-180}
      AUTO_ANALYZE_AFTER_SCRAPE: ${AUTO_ANALYZE_AFTER_SCRAPE:-true}
      AUTO_ENRICH_AFTER_ANALYZE: ${AUTO_ENRICH_AFTER_ANALYZE:-true}
      CAPTCHA_2CAPTCHA_API_KEY: ${CAPTCHA_2CAPTCHA_API_KEY:-}
      # Writable state under /data (named volume); avoids Errno 13 when ./config is a root-owned bind mount
      KEYWORDS_FILE_PATH: ${KEYWORDS_FILE_PATH:-/data/keywords.json}
      ACCOUNT_SCRAPE_SLOTS_PATH: ${ACCOUNT_SCRAPE_SLOTS_PATH:-/data/account_scrape_slots.json}
      # Writable facebook_accounts store (bind-mounted ./config is often root-owned → upload could not update credentials.json)
      CREDENTIALS_JSON_PATH: ${CREDENTIALS_JSON_PATH:-/data/credentials.json}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config
      - ./cookies:/app/cookies
      - scraper_data:/data
      - scraper_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - scraper_network

  frontend:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - scraper_network

volumes:
  postgres_data:
  redis_data:
  scraper_data:
  scraper_logs:

networks:
  scraper_network:
    driver: bridge
